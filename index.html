<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Steps</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <div id="home-screen">
    <div class="home-container">
      <img src="homepage.jpg" alt="Word Steps Home">
      <button id="playNowBtn" class="play-now-btn">Play Now</button>
    </div>
  </div>

  <div id="game" style="display:none;">
    <h1>Word Steps</h1>

    <p>Start word: <span id="currentWord"></span></p>
    <p>Time: <span id="time">200</span></p>
    <p>Score: <span id="score">0</span></p>

    <input type="text" id="wordInput" maxlength="4" placeholder="Enter 4-letter word">
    <button id="submitBtn">Submit</button>

    <p id="message"></p>
    <p id="finalScore"></p>
  </div>

  <script src="dictionary.js"></script>
  <script src="game2.js"></script>
</body>
</html>
